# netlify.toml

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://s-traccceer.vinfocom.co.in/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/Home/*"
  to = "https://s-traccceer.vinfocom.co.in/Home/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/Admin/*"
  to = "https://s-traccceer.vinfocom.co.in/Admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ExcelUpload/*"
  to = "https://s-traccceer.vinfocom.co.in/ExcelUpload/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
